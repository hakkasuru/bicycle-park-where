<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative circle behind bicycle -->
  <circle cx="600" cy="155" r="145" fill="rgba(255,255,255,0.07)"/>

  <!-- Bicycle scaled 2.5x and centered (occupies ~x:510-690, y:125-258) -->
  <g transform="translate(475, 60) scale(2.5)">
    <circle cx="28" cy="65" r="14" fill="none" stroke="white" stroke-width="4.5"/>
    <circle cx="72" cy="65" r="14" fill="none" stroke="white" stroke-width="4.5"/>
    <line x1="28" y1="65" x2="50" y2="65" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="28" y1="65" x2="44" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="50" y1="65" x2="44" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="44" y1="38" x2="66" y2="33" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="66" y1="33" x2="50" y2="65" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="66" y1="33" x2="72" y2="65" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="36" y1="35" x2="52" y2="35" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="66" y1="33" x2="66" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="59" y1="26" x2="73" y2="26" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Parking P badge (top-right of bicycle) -->
  <circle cx="718" cy="138" r="30" fill="white" opacity="0.92"/>
  <text x="718" y="149" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#1e40af">P</text>

  <!-- App name -->
  <text x="600" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="bold" fill="white">Bicycle Park Where?</text>

  <!-- Tagline -->
  <text x="600" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="rgba(255,255,255,0.85)">Find bicycle parking across Singapore</text>

  <!-- Stats -->
  <text x="600" y="464" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="rgba(255,255,255,0.65)">26,000+ official spots · Sheltered &amp; unsheltered · Filter by type &amp; capacity</text>

  <!-- Divider -->
  <line x1="420" y1="548" x2="780" y2="548" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- URL -->
  <text x="600" y="578" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">bicycle-park-where.vercel.app</text>
</svg>
