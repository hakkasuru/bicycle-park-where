<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#3b82f6"/>
  <!-- Rear wheel -->
  <circle cx="28" cy="65" r="14" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- Front wheel -->
  <circle cx="72" cy="65" r="14" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- Chain stay -->
  <line x1="28" y1="65" x2="50" y2="65" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Seat stay -->
  <line x1="28" y1="65" x2="44" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Seat tube -->
  <line x1="50" y1="65" x2="44" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Top tube -->
  <line x1="44" y1="38" x2="66" y2="33" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Down tube -->
  <line x1="66" y1="33" x2="50" y2="65" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Fork -->
  <line x1="66" y1="33" x2="72" y2="65" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="36" y1="35" x2="52" y2="35" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Handlebar stem -->
  <line x1="66" y1="33" x2="66" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Handlebars -->
  <line x1="59" y1="26" x2="73" y2="26" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
</svg>
